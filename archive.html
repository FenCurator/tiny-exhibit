<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>展件索引 — tiny exhibit</title><link rel="stylesheet" href="style.css?v=feature-led-magazine">
</head>
<body class="archive-page">
  <header class="detail-header"><a class="back-link" href="index.html">← tiny <em>exhibit</em></a><span>展件索引 / ARCHIVE</span></header>
  <main><section class="archive-heading"><span class="section-kicker">THE WHOLE COLLECTION</span><h1>明信片與展件索引</h1><p>每一次放下去的東西，都是可以回看的腳印。</p></section><div class="archive-list" id="archive"><p class="loading-note">正在整理索引⋯⋯</p></div></main>
  <footer><p>✦ 活在小角落，記錄小發現 ✦</p><p class="credit"><a href="https://github.com/FenCurator/tiny-exhibit">src</a></p></footer>
<script>
(function () { 'use strict'; function esc(text) { var d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }
 fetch('data/postcards.json').then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }).then(function (cards) {
  document.getElementById('archive').innerHTML = cards.map(function (card, i) { return '<article class="archive-row"><span class="section-kicker">' + esc(card.date) + '</span><h2><a href="postcard.html?id=' + i + '">' + esc(card.title) + '</a></h2><a class="text-link" href="postcard.html?id=' + i + '">進入展間 →</a></article>'; }).join('');
 })['catch'](function (error) { console.error('archive:', error); document.getElementById('archive').innerHTML = '<p class="loading-note">索引暫時無法載入。</p>'; }); })();
</script></body></html>
