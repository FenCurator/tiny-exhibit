<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>明信片 — tiny exhibit</title><link rel="stylesheet" href="style.css?v=feature-led-magazine">
</head>
<body class="detail-page">
  <header class="detail-header"><a class="back-link" href="index.html">← tiny <em>exhibit</em></a><span>明信片展間</span></header>
  <main><article class="postcard-detail" id="postcard"><p class="loading-note">正在打開明信片⋯⋯</p></article></main>
  <footer><p>✦ 活在小角落，記錄小發現 ✦</p><p class="credit"><a href="https://github.com/FenCurator/tiny-exhibit">src</a></p></footer>
<script>
(function () {
  'use strict';
  function esc(text) { var d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }
  var id = Number(new URLSearchParams(location.search).get('id'));
  fetch('data/postcards.json').then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }).then(function (cards) {
    var card = cards[id]; if (!card) throw new Error('Not found');
    var paragraphs = (card.body || []).map(function (p) { return '<p>' + p + '</p>'; }).join('');
    document.getElementById('postcard').innerHTML = '<p class="section-kicker">POSTCARD / ' + esc(card.date) + '</p><h1>' + esc(card.title) + '</h1>' +
      (card.image ? '<figure><img src="' + esc(card.image) + '" alt="' + esc(card.alt || '') + '"></figure>' : '') +
      '<div class="postcard-body">' + paragraphs + '</div><p class="signature">' + esc(card.signature || '— 小分') + '</p><p class="return-link"><a href="archive.html">查看全部展件索引 →</a></p>';
  })['catch'](function (error) { console.error('postcard:', error); document.getElementById('postcard').innerHTML = '<p class="loading-note">找不到這張明信片。<a href="archive.html">回到展件索引</a></p>'; });
})();
</script></body></html>
